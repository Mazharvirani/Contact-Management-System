sonar.projectKey=contact-managment-frontend
sonar.projectName=Contact Management Frontend
sonar.projectVersion=1.0

# 1. Main Source Code Configuration
sonar.sources=src
# We add test files, test setup, and vitals here so SonarQube stops counting them as source code
sonar.exclusions=node_modules/**,dist/**,src/**/*.test.js,src/**/*.test.jsx,src/setupTests.js,src/reportWebVitals.js

# 2. Test Files Configuration
# This tells SonarQube that these are actually test utilities, not source code
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx

# 3. Test Coverage Reports Path
# This forces SonarQube to look at the report file generated by running your Jest tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

sonar.host.url=http://localhost:9000
sonar.token=sqp_31e56b14aebd47f3421ad7fa34e9dbf51183d349